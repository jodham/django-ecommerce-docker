{% extends "base.html" %}


{% block title %}
Payment Failed | LUXE & CO.
{% endblock %}



{% block content %}


<section class="py-5 mt-5">


<div class="container text-center">


<h1>
Payment Failed
</h1>


<p class="mt-3">

Your M-Pesa payment was not completed.

</p>


<p>

Order:

<strong>
{{ order.order_number }}
</strong>

</p>


{% if order.payment_status != "paid" %}

    <a href="{% url 'retry_mpesa_payment' order.order_number %}"
    class="btn btn-dark mt-4">

    Retry M-Pesa Payment

    </a>

{% endif %}



</div>


</section>


{% endblock %}
