{% extends "base.html" %}

{% block content %}
<section id="shop" class="py-5 bg-light">
    <div class="container py-5">
        <div class="section-header" data-aos="fade-up">
            <span>Must Haves</span>
            <h2>Featured Masterpieces</h2>
        </div>
        
        <div class="swiper productSwiper" data-aos="zoom-in" data-aos-duration="1000">
            <div class="swiper-wrapper">
                <!-- Example of how to loop in Django -->
                <!-- {% for product in featured_products %} -->
                <div class="swiper-slide">
                    <div class="product-card">
                        <div class="product-image-wrapper">
                            <span class="badge-discount">NEW</span>
                            <img src="https://images.pexels.com/photos/6766308/pexels-photo-6766308.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=600" alt="Product" class="img-fluid">
                            <div class="product-actions">
                                <a href="#" class="action-btn" title="Add to Wishlist"><i class="bi bi-heart"></i></a>
                                <a href="#" class="action-btn" title="Quick View"><i class="bi bi-eye"></i></a>
                                <a href="#" class="action-btn" title="Add to Cart"><i class="bi bi-bag-plus"></i></a>
                            </div>
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">Executive Oxford Leather</h3>
                            <div class="mb-2 text-warning small">
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                            </div>
                            <p class="product-price">$450.00</p>
                        </div>
                    </div>
                </div>
                <!-- {% endfor %} -->

                <!-- Static items for preview -->
                <div class="swiper-slide">
                    <div class="product-card">
                        <div class="product-image-wrapper">
                            <span class="badge-discount">-20%</span>
                            <img src="https://images.pexels.com/photos/25652621/pexels-photo-25652621.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=600" alt="Product" class="img-fluid">
                            <div class="product-actions">
                                <a href="#" class="action-btn"><i class="bi bi-heart"></i></a>
                                <a href="#" class="action-btn"><i class="bi bi-eye"></i></a>
                                <a href="#" class="action-btn"><i class="bi bi-bag-plus"></i></a>
                            </div>
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">Midnight Brogue Edition</h3>
                            <div class="mb-2 text-warning small">
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-half"></i>
                            </div>
                            <p class="product-price"><span class="old-price">$520.00</span>$416.00</p>
                        </div>
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="product-card">
                        <div class="product-image-wrapper">
                            <img src="https://images.pexels.com/photos/8069881/pexels-photo-8069881.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=600" alt="Product" class="img-fluid">
                            <div class="product-actions">
                                <a href="#" class="action-btn"><i class="bi bi-heart"></i></a>
                                <a href="#" class="action-btn"><i class="bi bi-eye"></i></a>
                                <a href="#" class="action-btn"><i class="bi bi-bag-plus"></i></a>
                            </div>
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">Suede Heritage Loafer</h3>
                            <div class="mb-2 text-warning small">
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                            </div>
                            <p class="product-price">$380.00</p>
                        </div>
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="product-card">
                        <div class="product-image-wrapper">
                            <img src="https://images.pexels.com/photos/31452056/pexels-photo-31452056.jpeg?auto=compress&cs=tinysrgb&fit=crop&h=600&w=600" alt="Product" class="img-fluid">
                            <div class="product-actions">
                                <a href="#" class="action-btn"><i class="bi bi-heart"></i></a>
                                <a href="#" class="action-btn"><i class="bi bi-eye"></i></a>
                                <a href="#" class="action-btn"><i class="bi bi-bag-plus"></i></a>
                            </div>
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">Signature Gift Set Edition</h3>
                            <div class="mb-2 text-warning small">
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                            </div>
                            <p class="product-price">$890.00</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="swiper-pagination mt-5"></div>
        </div>
    </div>
</section>
{% endblock %}
